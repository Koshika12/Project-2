<!DOCTYPE html>
<html>
<head>
    <title>Teacher Signup</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #1f8a37;
        }

        .link {
            text-align: center;
            margin-top: 10px;
        }

        .link a {
            text-decoration: none;
            color: #28a745;
        }
        .dropdown {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
    background: white;
    font-size: 14px;
    cursor: pointer;
    appearance: none; /* remove default arrow */
    -webkit-appearance: none;
    -moz-appearance: none;
}

/* custom arrow */
.dropdown {
    background-image: url("data:image/svg+xml;utf8,<svg fill='%23666' height='20' viewBox='0 0 20 20' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M5.516 7.548L10 12.032l4.484-4.484L16 9.064l-6 6-6-6z'/></svg>");
    background-repeat: no-repeat;
    background-position: right 10px center;
    background-size: 16px;
}

/* focus effect */
.dropdown:focus {
    outline: none;
    border-color: #28a745;
    box-shadow: 0 0 5px rgba(40, 167, 69, 0.3);
}
    </style>
</head>
<body>

<div class="box">
    <h2>Teacher Signup</h2>

   <form method="POST">
    <input type="email" name="email" placeholder="Email" required>
    <input type="password" name="password" placeholder="Password" required>

    <select name="teacher_id" required class="dropdown">
        <option value="">Select Your Name</option>
        {% for t in teachers %}
            <option value="{{ t.id }}">{{ t.name }}</option>
        {% endfor %}
    </select>

    <button type="submit">Create Account</button>
</form>

    <div class="link">
        <p>Already have an account? <a href="/teacher/login">Login</a></p>
    </div>
</div>

</body>
</html>
