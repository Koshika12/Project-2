<!DOCTYPE html>
<html>
<head>
    <title>Select Role</title>
    <style>
        body {
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f2f2f2;
        }

        .container {
            display: flex;
            gap: 40px;
        }

        .card {
            width: 200px;
            height: 200px;
            background: white;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
            text-decoration: none;
            color: black;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .icon {
            font-size: 50px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- ADMIN -->
    <a class="card" href="/admin/login">
        <div class="icon">👨‍💼</div>
        <h3>Admin</h3>
    </a>

    <!-- TEACHER -->
    <a class="card" href="/teacher/login">
        <div class="icon">👨‍🏫</div>
        <h3>Teacher</h3>
    </a>

</div>

</body>
</html>
