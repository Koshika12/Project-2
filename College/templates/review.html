<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit Review - TeachRate</title>
<style>
/* ===== Gradient Background ===== */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(-45deg, #1abc9c, #2c3e50, #3498db, #16a085);
    background-size: 400% 400%;
    animation: gradientBG 12s ease infinite;
    color: white;
}
@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* ===== Navbar ===== */
.navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; backdrop-filter: blur(15px); background: rgba(255,255,255,0.08); border-bottom: 1px solid rgba(255,255,255,0.2); }
.logo { font-size: 24px; font-weight: bold; cursor: pointer; }
.nav-links { list-style: none; display: flex; gap: 20px; align-items: center; }
.nav-links a { text-decoration: none; color: white; font-weight: 500; position: relative; }
.nav-links a::after { content: ''; width: 0%; height: 2px; position: absolute; left: 0; bottom: -5px; background: #1abc9c; transition: 0.3s; }
.nav-links a:hover::after { width: 100%; }
.profile-icon { width: 40px; border-radius: 50%; cursor: pointer; transition: 0.3s; }
.profile-icon:hover { transform: scale(1.1); }

/* Dropdown */
.dropdown-menu { position: absolute; top: 60px; right: 40px; background: white; color: black; border-radius: 10px; overflow: hidden; transform: scale(0.8); opacity: 0; transition: 0.3s; z-index: 100; }
.dropdown-menu.show { transform: scale(1); opacity: 1; }
.dropdown-menu a { display: block; padding: 12px 20px; text-decoration: none; color: black; }
.dropdown-menu a:hover { background: #f1f1f1; }

/* Container */
.container { max-width: 800px; margin: 40px auto; padding: 30px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 15px; color: white; }

/* Form styles */
input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; outline: none; }
textarea { resize: none; }
button { padding: 12px 20px; border-radius: 25px; border: none; background: #1abc9c; color: white; cursor: pointer; transition: 0.3s; }
button:hover { background: #16a085; }

/* Message */
.message { padding: 15px; background: rgba(255, 100, 100, 0.3); border-radius: 10px; margin-bottom: 20px; text-align: center; }

/* Footer */
footer { text-align: center; padding: 20px; color: white; margin-top: 50px; }
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <div class="logo" onclick="window.location.href='{{ url_for('dashboard') }}'">TeachRate</div>
    <ul class="nav-links">
        <li><a href="{{ url_for('teachers') }}">Teachers</a></li>
        <li><a href="{{ url_for('review') }}">Reviews</a></li>
        <li><a href="#">History</a></li>
        <li><img src="{{ url_for('static', filename='profile.png') }}" class="profile-icon" onclick="toggleDropdown()"></li>
    </ul>
</nav>

<!-- Dropdown -->
<div id="profileDropdown" class="dropdown-menu">
   <a href="{{ url_for('logout') }}">Logout</a>
</div>

<!-- Main Content -->
<div class="container">

    {% if message %}
        <div class="message">{{ message }}</div>
        <div style="text-align: center; margin-top: 20px;">
            <button onclick="window.location.href='{{ url_for('teachers') }}'">Go to Teachers</button>
        </div>
    {% endif %}

    {% if show_form %}
        <h2>Submit Your Review for {{ teacher.name }}</h2>
        <form method="post">
            <label>Student Name:</label>
            <input type="text" value="{{ student_name }}" readonly>

            <label>Teacher:</label>
            <input type="text" value="{{ teacher.name }}" readonly>

            <label>Rating (1-5):</label>
            <input type="number" name="rating" min="1" max="5" step="1" required oninput="validity.valid||(value='');">

            <label>Review:</label>
            <textarea name="review" rows="5" required></textarea>

            <button type="submit">Submit Review</button>
        </form>
    {% endif %}

    {% if success %}
        <div class="message" style="background: rgba(100,255,100,0.3);">
            You submitted your review successfully!
        </div>
        <div style="text-align: center; margin-top: 20px;">
            <button onclick="window.location.href='{{ url_for('teachers') }}'">Go to Teachers</button>
        </div>
    {% endif %}

</div>

<footer>© 2026 TeachRate | All Rights Reserved</footer>

<script>

/* Dropdown */
function toggleDropdown() { document.getElementById("profileDropdown").classList.toggle("show"); }
window.onclick = function(event) {
    if (!event.target.matches('.profile-icon')) {
        document.getElementById("profileDropdown").classList.remove('show');
    }
}
</script>

</body>
</html>
